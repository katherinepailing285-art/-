<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>计时器</title>
<!-- 👇 下面这三行是 iPad 桌面全屏模式 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="计时器">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0f111a;color:#fff;height:100vh;display:flex;flex-direction:column;padding:12px}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.top-left button{background:none;border:none;color:#fff;font-size:28px;margin-right:14px}
.img-btns{display:flex;gap:10px}
.img-btns button{width:44px;height:44px;background:#38f;color:#fff;border:none;border-radius:10px;font-size:20px}

.main{display:flex;align-items:center;gap:20px;flex:1}

.gift-area{width:360px;display:flex;flex-direction:column;gap:24px}
.gift-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.gift-item{display:flex;flex-direction:column;align-items:center;gap:10px}
.gift-box{width:130px;height:130px;background:#222;border-radius:20px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.gift-box img{width:100%;height:100%;object-fit:cover}
.gift-item.big .gift-box{width:160px;height:160px}
.gift-label{font-size:32px;font-weight:700}

.time-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.time{display:flex;align-items:center;font-size:140px;font-weight:200;gap:10px;font-variant-numeric:tabular-nums;margin-bottom:50px}
.time-part{display:flex;flex-direction:column;align-items:center}
.time-part button{background:none;border:none;color:#fff;font-size:60px}

.btns{display:flex;gap:36px}
.btns button{width:220px;height:80px;border-radius:40px;font-size:32px;font-weight:700}
#start{background:#36f;color:#fff;border:none}
#reset{background:transparent;color:#fff;border:2px solid #777}

.mirror{transform:scaleX(-1)}
.light{background:#fdfaf5;color:#222}
.light .time-part button{color:#222}

.modal{position:fixed;inset:0;background:#000000cc;display:none;align-items:center;justify-content:center;z-index:999}
.crop-wrap{position:relative;width:320px;height:320px}
.crop-box{position:absolute;inset:0;border:2px solid #38f;border-radius:8px;background:#0001;overflow:hidden}
#cropImg{position:absolute;top:0;left:0;transform-origin:0 0;touch-action:none}
.crop-footer{margin-top:20px;display:flex;gap:20px;justify-content:center}
.crop-footer button{padding:14px 30px;border-radius:12px;font-size:20px}
#cropYes{background:#36f;color:#fff;border:none}
#cropNo{background:#555;color:#fff;border:none}

#fileInput{display:none}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <button onclick="window.close()">✕</button>
    <button onclick="toggleMirror()">⟷</button>
    <button onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="img-btns">
    <button onclick="pick(0)">1</button>
    <button onclick="pick(1)">2</button>
    <button onclick="pick(2)">3</button>
    <button onclick="pick(3)">4</button>
    <button onclick="pick(4)">5</button>
  </div>
</div>

<div class="main" id="box">
  <div class="gift-area">
    <div class="gift-grid">
      <div class="gift-item"><div class="gift-box" onclick="add(1)">< img id="i0"></div><div class="gift-label">+1s</div></div>
      <div class="gift-item"><div class="gift-box" onclick="add(20)">< img id="i1"></div><div class="gift-label">+20s</div></div>
      <div class="gift-item"><div class="gift-box" onclick="add(60)">< img id="i2"></div><div class="gift-label">+1min</div></div>
      <div class="gift-item"><div class="gift-box" onclick="reset()">< img id="i3"></div><div class="gift-label">清零</div></div>
    </div>
    <div class="gift-item big"><div class="gift-box">< img id="i4"></div><div class="gift-label">心理辅导</div></div>
  </div>

  <div class="time-area">
    <div class="time">
      <div class="time-part"><button onclick="set('h',1)">︿</button><div id="h">00</div><button onclick="set('h',-1)">﹀</button></div>
      <div>:</div>
      <div class="time-part"><button onclick="set('m',1)">︿</button><div id="m">00</div><button onclick="set('m',-1)">﹀</button></div>
      <div>:</div>
      <div class="time-part"><button onclick="set('s',1)">︿</button><div id="s">00</div><button onclick="set('s',-1)">﹀</button></div>
    </div>
    <div class="btns">
      <button id="start" onclick="go()">开始</button>
      <button onclick="reset()">重置</button>
    </div>
  </div>
</div>

<div class="modal" id="cropModal">
  <div>
    <div class="crop-wrap">
      <div class="crop-box">
        < img id="cropImg">
      </div>
    </div>
    <div class="crop-footer">
      <button id="cropNo" onclick="closeCrop()">取消</button>
      <button id="cropYes" onclick="doCrop()">确认裁剪</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<script>
let total = 0, timer = null, isRun = false
let selIndex = 0

function upd() {
  const h = Math.floor(total / 3600)
  const m = Math.floor((total % 3600) / 60)
  const s = total % 60
  document.getElementById('h').innerText = String(h).padStart(2, '0')
  document.getElementById('m').innerText = String(m).padStart(2, '0')
  document.getElementById('s').innerText = String(s).padStart(2, '0')
}

function set(type, n) {
  if (type === 'h') total += n * 3600
  if (type === 'm') total += n * 60
  if (type === 's') total += n
  if (total < 0) total = 0
  upd()
}

function add(n) { total += n; upd() }

function go() {
  if (isRun) {
    clearInterval(timer); isRun = false
    start.innerText = '继续'
    start.style.background = '#36f'
  } else {
    if (total <= 0) return
    isRun = true
    start.innerText = '暂停'
    start.style.background = '#f44'
    timer = setInterval(() => {
      if (total > 0) { total--; upd() }
      else { clearInterval(timer); isRun = false; alert('时间到！'); go() }
    }, 1000)
  }
}

function reset() {
  clearInterval(timer); isRun = false; total = 0; upd()
  start.innerText = '开始'
  start.style.background = '#36f'
}

function toggleMirror() { box.classList.toggle('mirror') }
function toggleTheme() {
  document.body.classList.toggle('light')
  themeBtn.innerText = document.body.classList.contains('light') ? '☀️' : '🌙'
}

let img = document.getElementById('cropImg')
let x = 0, y = 0, scale = 1
let lastTouch = null

function pick(idx) { selIndex = idx; fileInput.click() }

fileInput.onchange = e => {
  const file = e.target.files[0]
  if (!file) return
  const url = URL.createObjectURL(file)
  img.src = url
  x = 0; y = 0; scale = 1
  updateTransform()
  cropModal.style.display = 'flex'
}

function closeCrop() { cropModal.style.display = 'none' }

img.addEventListener('touchstart', e => {
  e.preventDefault()
  if (e.touches.length === 1) {
    const t = e.touches[0]
    lastTouch = { x: t.clientX, y: t.clientY }
  }
  if (e.touches.length === 2) {
    const t1 = e.touches[0], t2 = e.touches[1]
    const dx = t1.clientX - t2.clientX
    const dy = t1.clientY - t2.clientY
    lastTouch = { dist: Math.hypot(dx, dy) }
  }
})

img.addEventListener('touchmove', e => {
  e.preventDefault()
  if (e.touches.length === 1 && lastTouch) {
    const t = e.touches[0]
    const dx = t.clientX - lastTouch.x
    const dy = t.clientY - lastTouch.y
    x += dx; y += dy
    lastTouch = { x: t.clientX, y: t.clientY }
    updateTransform()
  }
  if (e.touches.length === 2 && lastTouch) {
    const t1 = e.touches[0], t2 = e.touches[1]
    const dx = t1.clientX - t2.clientX
    const dy = t1.clientY - t2.clientY
    const dist = Math.hypot(dx, dy)
    const factor = dist / lastTouch.dist
    scale *= factor
    if (scale < 0.3) scale = 0.3
    if (scale > 3) scale = 3
    lastTouch.dist = dist
    updateTransform()
  }
})

img.addEventListener('touchend', () => { lastTouch = null })

function updateTransform() {
  img.style.transform = `translate(${x}px, ${y}px) scale(${scale})`
}

function doCrop() {
  const box = document.querySelector('.crop-box')
  const size = 320
  const canvas = document.createElement('canvas')
  canvas.width = size; canvas.height = size
  const ctx = canvas.getContext('2d')

  const naturalW = img.naturalWidth
  const naturalH = img.naturalHeight
  const renderW = naturalW * scale
  const renderH = naturalH * scale
  const sx = (-x / renderW) * naturalW
  const sy = (-y / renderH) * naturalH
  const sSize = (size / renderW) * naturalW

  ctx.drawImage(img, sx, sy, sSize, sSize, 0, 0, size, size)
  document.getElementById('i' + selIndex).src = canvas.toDataURL('image/png')
  closeCrop()
}

upd()
</script>
</body>
</html>
